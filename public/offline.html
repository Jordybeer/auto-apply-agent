<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Offline — jobtide</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100dvh;
      background: #0e1018;
      color: #f0f2ff;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .card {
      text-align: center;
      padding: 2rem 1.5rem;
      background: rgba(28,31,44,0.70);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 1.25rem;
      max-width: 320px;
      width: 100%;
    }
    .icon { font-size: 2.5rem; margin-bottom: 1rem; }
    h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
    p { font-size: 0.875rem; color: #a8b0d0; line-height: 1.5; margin-bottom: 1.5rem; }
    button {
      background: linear-gradient(135deg, #818cf8, #6d28d9);
      color: #fff;
      border: none;
      border-radius: 0.75rem;
      padding: 0.75rem 1.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Geen verbinding</h1>
    <p>jobtide heeft internet nodig. Controleer je verbinding en probeer opnieuw.</p>
    <button onclick="window.location.reload()">Opnieuw proberen</button>
  </div>
</body>
</html>
